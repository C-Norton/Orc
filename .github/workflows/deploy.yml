name: Test and Deploy

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  # ─────────────────────────────────────────────
  # Run the full test suite
  # Runs on every push and every PR targeting master.
  # ─────────────────────────────────────────────
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"   # Latest stable 3.x
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  # ─────────────────────────────────────────────
  # Deploy to the GCP VM via IAP SSH
  # Only runs on pushes to master (not PRs), and only if tests pass.
  # ─────────────────────────────────────────────
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: test                        # Hard dependency — deploy only if test passes
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write                  # Required for WIF token exchange

    steps:
      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "beta"   # Needed for IAP tunnel SSH

      - name: Deploy to VM via IAP SSH
        run: |
          gcloud compute ssh ${{ secrets.VM_NAME }} \
            --zone=${{ secrets.VM_ZONE }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --command="
              set -euo pipefail


              echo '--- Pulling latest code ---'
                            git config --global --add safe.directory /opt/orc
              # Clone the repo if this is the first deploy, otherwise pull.
              if [ ! -d /opt/orc/.git ]; then
                git clone https://github.com/C-Norton/Orc.git /opt/orc
              else
                git -C /opt/orc fetch origin master
                git -C /opt/orc reset --hard origin/master
              fi

              echo '--- Installing dependencies ---'
              /opt/orc/.venv/bin/pip install --quiet -r /opt/orc/requirements.txt

              echo '--- Running database migrations ---'
              cd /opt/orc && set -a && source /etc/orc-bot.env && set +a && /opt/orc/.venv/bin/alembic upgrade head
              echo '--- Restarting bot service ---'
              sudo -n systemctl restart orc-bot.service

              echo '--- Verifying service started ---'
              sleep 3
              sudo -n systemctl is-active orc-bot.service
              echo 'Deploy complete.'
            "
